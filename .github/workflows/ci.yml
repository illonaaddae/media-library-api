name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # No Mongo service container needed — mongodb-memory-server downloads and
      # runs its own mongod binary for the test suite. The .env.test file is
      # gitignored, so the test env is provided here; DATABASE_URL is a
      # throwaway (mongodb-memory-server overrides the real connection).
      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: mongodb://127.0.0.1:27017/media_library_test
          UPLOAD_DIR: uploads_test
          LOG_LEVEL: error

      # Upload the coverage report even if the run fails the threshold, so it's
      # available for inspection on every run.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
