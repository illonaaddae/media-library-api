<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Media Library</title>
  <style>
    :root {
      --bg: #0f1115; --surface: #181b22; --surface-2: #20242e; --border: #2b303b;
      --text: #e6e9ef; --muted: #9aa4b2; --accent: #6d9dff; --accent-2: #4f7fe0;
      --ok: #35c47f; --warn: #e0a83d; --danger: #e55c5c; --radius: 14px;
      --shadow: 0 6px 24px rgba(0,0,0,.35);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:#f4f6fb; --surface:#fff; --surface-2:#f0f2f8; --border:#e2e6ef;
        --text:#1a1f2b; --muted:#5b6472; --shadow:0 6px 20px rgba(30,40,80,.08);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    header {
      display: flex; align-items: center; gap: 14px; padding: 18px 24px;
      border-bottom: 1px solid var(--border); background: var(--surface);
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 20px; margin: 0; font-weight: 700; letter-spacing: -.02em; }
    header .logo { font-size: 24px; }
    .health { margin-left: auto; display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
    .dot.ok { background: var(--ok); box-shadow: 0 0 0 3px rgba(53,196,127,.2); }
    .dot.down { background: var(--danger); box-shadow: 0 0 0 3px rgba(229,92,92,.2); }
    main { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
    .upload { margin-bottom: 22px; }
    .upload h2 { margin: 0 0 14px; font-size: 15px; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); }
    form.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    input, select {
      width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text); font-size: 14px; outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input[type=file] { padding: 8px; }
    .full { grid-column: 1 / -1; }
    button {
      cursor: pointer; border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      padding: 10px 16px; background: var(--accent); color: #fff; transition: background .15s;
    }
    button:hover { background: var(--accent-2); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    button.ghost:hover { background: var(--surface-2); }
    button.danger { background: transparent; color: var(--danger); border: 1px solid var(--border); }
    button.danger:hover { background: rgba(229,92,92,.1); }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; margin-bottom: 18px; }
    .toolbar .field { flex: 1; min-width: 140px; }
    .grid-gallery { display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }
    .media { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column;
      box-shadow: var(--shadow); }
    .thumb { aspect-ratio: 16/10; background: var(--surface-2); display: flex;
      align-items: center; justify-content: center; overflow: hidden; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb .ph { font-size: 40px; opacity: .5; }
    .media .body { padding: 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .media .title { font-weight: 600; font-size: 15px; word-break: break-word; }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: 999px; text-transform: uppercase; letter-spacing: .04em; }
    .cat-image { background: rgba(109,157,255,.18); color: var(--accent); }
    .cat-document { background: rgba(224,168,61,.18); color: var(--warn); }
    .cat-video { background: rgba(229,92,92,.18); color: var(--danger); }
    .cat-audio { background: rgba(53,196,127,.18); color: var(--ok); }
    .cat-other { background: var(--surface-2); color: var(--muted); }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { font-size: 11px; background: var(--surface-2); color: var(--muted);
      padding: 2px 8px; border-radius: 999px; }
    .meta { font-size: 12px; color: var(--muted); margin-top: auto; }
    .actions { display: flex; gap: 8px; padding: 0 14px 14px; }
    .actions button { flex: 1; padding: 8px; font-size: 13px; }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-top: 24px; color: var(--muted); font-size: 14px; }
    .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
    .toasts { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column;
      gap: 10px; z-index: 100; }
    .toast { padding: 12px 18px; border-radius: 10px; color: #fff; box-shadow: var(--shadow);
      font-size: 14px; animation: slide .2s ease; }
    .toast.ok { background: var(--ok); } .toast.err { background: var(--danger); }
    @keyframes slide { from { transform: translateX(20px); opacity: 0; } }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none;
      align-items: center; justify-content: center; z-index: 50; }
    .modal-bg.show { display: flex; }
    .modal { width: min(420px, 92vw); }
    .modal h2 { margin: 0 0 16px; font-size: 17px; }
    .modal .row { margin-bottom: 12px; }
    .modal .foot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: -2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 560px) { form.grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <span class="logo">🎬</span>
    <h1>Media Library</h1>
    <div class="health"><span class="dot" id="healthDot"></span><span id="healthText">checking…</span></div>
  </header>

  <main>
    <!-- Upload -->
    <section class="card upload">
      <h2>Upload media</h2>
      <form class="grid" id="uploadForm">
        <div><label>Title</label><input name="title" required placeholder="e.g. Sunset over Accra" /></div>
        <div>
          <label>Category</label>
          <select name="category" required>
            <option value="image">image</option>
            <option value="document">document</option>
            <option value="video">video</option>
            <option value="audio">audio</option>
            <option value="other">other</option>
          </select>
        </div>
        <div class="full"><label>Tags (comma-separated)</label><input name="tags" placeholder="beach, travel" /></div>
        <div class="full"><label>File (jpeg / png / pdf, max 5MB)</label><input type="file" name="file" required /></div>
        <div class="full"><button type="submit" id="uploadBtn">Upload</button></div>
      </form>
    </section>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="field"><label>Search title</label><input id="search" placeholder="Search…" /></div>
      <div class="field">
        <label>Category</label>
        <select id="filterCat">
          <option value="">All</option>
          <option value="image">image</option><option value="document">document</option>
          <option value="video">video</option><option value="audio">audio</option><option value="other">other</option>
        </select>
      </div>
      <div class="field">
        <label>Sort</label>
        <select id="sort">
          <option value="createdAt:desc">Newest</option>
          <option value="createdAt:asc">Oldest</option>
          <option value="title:asc">Title A–Z</option>
          <option value="fileSize:desc">Largest</option>
        </select>
      </div>
    </div>

    <div class="grid-gallery" id="gallery"></div>
    <div class="empty" id="empty" style="display:none">No media yet — upload something above.</div>
    <div class="pagination" id="pagination" style="display:none">
      <button class="ghost" id="prevBtn">← Prev</button>
      <span id="pageInfo"></span>
      <button class="ghost" id="nextBtn">Next →</button>
    </div>
  </main>

  <!-- Edit modal -->
  <div class="modal-bg" id="modalBg">
    <div class="card modal">
      <h2>Edit media</h2>
      <input type="hidden" id="editId" />
      <div class="row"><label>Title</label><input id="editTitle" /></div>
      <div class="row">
        <label>Category</label>
        <select id="editCat">
          <option value="image">image</option><option value="document">document</option>
          <option value="video">video</option><option value="audio">audio</option><option value="other">other</option>
        </select>
      </div>
      <div class="row"><label>Tags (comma-separated)</label><input id="editTags" /></div>
      <div class="foot">
        <button class="ghost" id="cancelEdit">Cancel</button>
        <button id="saveEdit">Save</button>
      </div>
    </div>
  </div>

  <div class="toasts" id="toasts"></div>

  <script>
    const state = { page: 1, limit: 8, search: '', category: '', sortBy: 'createdAt', order: 'desc' };
    const $ = (id) => document.getElementById(id);

    const fileName = (p) => (p ? String(p).split(/[\\/]/).pop() : '');
    function imgSrc(m) {
      if (m.thumbnailPath) return '/uploads/thumbnails/' + fileName(m.thumbnailPath);
      if (m.filePath && m.mimeType && m.mimeType.startsWith('image/')) return '/uploads/' + fileName(m.filePath);
      return '';
    }
    const CAT_ICON = { image:'🖼️', document:'📄', video:'🎞️', audio:'🎵', other:'📦' };
    const fmtSize = (b) => b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
    const fmtDate = (d) => new Date(d).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});

    function toast(msg, type='ok') {
      const el = document.createElement('div');
      el.className = 'toast ' + type; el.textContent = msg;
      $('toasts').appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    async function checkHealth() {
      try {
        const r = await fetch('/health'); const j = await r.json();
        if (j.status === 'ok') { $('healthDot').className = 'dot ok';
          $('healthText').textContent = 'API healthy · up ' + Math.floor(j.uptime) + 's'; return; }
        throw 0;
      } catch { $('healthDot').className = 'dot down'; $('healthText').textContent = 'API unreachable'; }
    }

    async function loadMedia() {
      const p = new URLSearchParams({ page: state.page, limit: state.limit, sortBy: state.sortBy, order: state.order });
      if (state.search) p.set('search', state.search);
      if (state.category) p.set('category', state.category);
      try {
        const r = await fetch('/media?' + p.toString());
        const j = await r.json();
        if (j.status !== 'success') throw new Error(j.message || 'Failed to load');
        render(j.data);
      } catch (e) { toast(e.message || 'Failed to load media', 'err'); }
    }

    function render(data) {
      const { results, pagination } = data;
      const g = $('gallery'); g.innerHTML = '';
      $('empty').style.display = results.length ? 'none' : 'block';
      $('pagination').style.display = pagination.totalPages > 1 ? 'flex' : 'none';
      for (const m of results) {
        const src = imgSrc(m);
        const card = document.createElement('div');
        card.className = 'media';
        card.innerHTML = `
          <div class="thumb">${src
            ? `<img src="${src}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph',textContent:'${CAT_ICON[m.category]||'📦'}'}))" />`
            : `<div class="ph">${CAT_ICON[m.category] || '📦'}</div>`}</div>
          <div class="body">
            <div class="title">${esc(m.title)}</div>
            <div><span class="badge cat-${m.category}">${m.category}</span></div>
            <div class="tags">${(m.tags||[]).map(t=>`<span class="tag">#${esc(t)}</span>`).join('')}</div>
            <div class="meta">${fmtSize(m.fileSize)} · ${fmtDate(m.createdAt)}</div>
          </div>
          <div class="actions">
            <button class="ghost" data-edit="${m._id}">Edit</button>
            <button class="danger" data-del="${m._id}">Delete</button>
          </div>`;
        g.appendChild(card);
      }
      $('pageInfo').textContent = `Page ${pagination.page} of ${pagination.totalPages} · ${pagination.total} items`;
      $('prevBtn').disabled = pagination.page <= 1;
      $('nextBtn').disabled = pagination.page >= pagination.totalPages;
      g.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openEdit(results.find(x => x._id === b.dataset.edit)));
      g.querySelectorAll('[data-del]').forEach(b => b.onclick = () => del(b.dataset.del));
    }
    const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    // Upload
    $('uploadForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = $('uploadBtn'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Uploading…';
      try {
        const fd = new FormData(e.target);
        const r = await fetch('/media', { method: 'POST', body: fd });
        const j = await r.json();
        if (!r.ok || j.status !== 'success') {
          const msg = j.details ? j.details.map(d => d.field + ': ' + d.message).join(', ') : (j.message || 'Upload failed');
          throw new Error(msg);
        }
        toast('Uploaded “' + j.data.title + '”');
        e.target.reset(); state.page = 1; loadMedia();
      } catch (err) { toast(err.message, 'err'); }
      finally { btn.disabled = false; btn.textContent = 'Upload'; }
    };

    // Edit
    function openEdit(m) {
      $('editId').value = m._id; $('editTitle').value = m.title;
      $('editCat').value = m.category; $('editTags').value = (m.tags || []).join(', ');
      $('modalBg').classList.add('show');
    }
    $('cancelEdit').onclick = () => $('modalBg').classList.remove('show');
    $('modalBg').onclick = (e) => { if (e.target === $('modalBg')) $('modalBg').classList.remove('show'); };
    $('saveEdit').onclick = async () => {
      const id = $('editId').value;
      const body = { title: $('editTitle').value, category: $('editCat').value, tags: $('editTags').value };
      try {
        const r = await fetch('/media/' + id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const j = await r.json();
        if (!r.ok || j.status !== 'success') {
          const msg = j.details ? j.details.map(d => d.field + ': ' + d.message).join(', ') : (j.message || 'Update failed');
          throw new Error(msg);
        }
        toast('Updated'); $('modalBg').classList.remove('show'); loadMedia();
      } catch (err) { toast(err.message, 'err'); }
    };

    // Delete
    async function del(id) {
      if (!confirm('Delete this media item?')) return;
      try {
        const r = await fetch('/media/' + id, { method: 'DELETE' });
        const j = await r.json();
        if (!r.ok || j.status !== 'success') throw new Error(j.message || 'Delete failed');
        toast('Deleted'); loadMedia();
      } catch (err) { toast(err.message, 'err'); }
    }

    // Toolbar wiring
    let searchTimer;
    $('search').oninput = (e) => { clearTimeout(searchTimer); searchTimer = setTimeout(() => {
      state.search = e.target.value.trim(); state.page = 1; loadMedia(); }, 350); };
    $('filterCat').onchange = (e) => { state.category = e.target.value; state.page = 1; loadMedia(); };
    $('sort').onchange = (e) => { const [b, o] = e.target.value.split(':'); state.sortBy = b; state.order = o; state.page = 1; loadMedia(); };
    $('prevBtn').onclick = () => { if (state.page > 1) { state.page--; loadMedia(); } };
    $('nextBtn').onclick = () => { state.page++; loadMedia(); };

    // Init
    checkHealth(); loadMedia(); setInterval(checkHealth, 30000);
  </script>
</body>
</html>
